<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - Shop Cầu Lông VNB</title>
    <script src="./js/layout.js"></script>
    <link rel="stylesheet" href="../frontend/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>

    <header id="header"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <h5 class="fw-bold text-uppercase mb-3" style="color: #333;">Nơi giải đáp toàn bộ mọi thắc mắc của bạn?
                </h5>

                <p class="mb-2 fw-bold" style="color: #333;">
                    Hotline: <span style="color: #ea5c0b;">0977508430 | 0338000308</span>
                </p>
                <p class="mb-4 fw-bold" style="color: #333;">
                    Email: <span style="color: #ea5c0b;">info@shopvnb.com</span>
                </p>

                <h5 class="fw-bold text-uppercase mb-4" style="color: #333;">Liên hệ với chúng tôi</h5>

                <form action="#" method="POST">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control py-2" placeholder="Họ và tên" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" class="form-control py-2" placeholder="Email" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <input type="tel" class="form-control py-2" placeholder="Điện thoại" required>
                    </div>

                    <div class="mb-4">
                        <textarea class="form-control py-2" rows="6" placeholder="Nội dung" required></textarea>
                    </div>

                    <button type="submit" class="btn text-white px-4 py-2"
                        style="background-color: #005b7a; border-radius: 4px;">
                        Gửi thông tin
                    </button>

                </form>

            </div>
        </div>
    </main>
    <footer id="footer" class="site-footer"></footer>

</body>

</html>
