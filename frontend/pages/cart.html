<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ-hàng-của-bạn</title>
    <script src="../js/layout.js"></script>
    <script src="../frontend/js/cart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../../frontend/css/style.css">
</head>

<body>

    <header class="header" id="header">

    </header>

    <main class="cart-page py-5 bg-light">
        <div class="container">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-dark">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-orange" aria-current="page">Giỏ hàng</li>
                </ol>
            </nav>

            <div class="cart-container shadow-sm bg-white rounded">
                <h5 class="cart-title p-3 mb-0 text-uppercase fw-bold">Giỏ hàng của bạn</h5>

                <div id="cart-full">
                    <div class="cart-header-bar text-white p-2 px-3 fw-bold">GIỎ HÀNG</div>

                    <div class="cart-items p-3">
                        <div class="cart-item row align-items-center py-3 border-bottom position-relative">
                            <div class="col-2 col-md-1">
                                <img src="../IMG/victor.png" alt="Vợt Victor" class="img-fluid">
                            </div>
                            <div class="col-10 col-md-5">
                                <h6 class="mb-1 fw-bold">Vợt cầu lông Victor Auraspeed FANTÔME F HYQ chính hãng</h6>
                            </div>
                            <div class="col-6 col-md-3 mt-3 mt-md-0">
                                <div class="input-group quantity-group mx-auto">
                                    <button class="btn btn-outline-secondary btn-sm" type="button">-</button>
                                    <input type="text" class="form-control form-control-sm text-center" value="1">
                                    <button class="btn btn-outline-secondary btn-sm" type="button">+</button>
                                </div>
                            </div>
                            <div class="col-6 col-md-3 mt-3 mt-md-0 text-end">
                                <span class="fw-bold text-orange">4.490.000 đ</span>
                            </div>
                            <button class="btn-remove-item"><i class="fa-regular fa-circle-xmark"></i></button>
                        </div>

                        <div class="cart-item row align-items-center py-3 border-bottom position-relative">
                            <div class="col-2 col-md-1">
                                <img src="../IMG/victor.png" alt="Vợt Yonex" class="img-fluid">
                            </div>
                            <div class="col-10 col-md-5">
                                <h6 class="mb-1 fw-bold">Vợt cầu lông Yonex Astrox 22 Lite (BK/RD) chính hãng</h6>
                                <small class="text-muted">Size: 3F5</small>
                            </div>
                            <div class="col-6 col-md-3 mt-3 mt-md-0">
                                <div class="input-group quantity-group mx-auto">
                                    <button class="btn btn-outline-secondary btn-sm" type="button">-</button>
                                    <input type="text" class="form-control form-control-sm text-center" value="1">
                                    <button class="btn btn-outline-secondary btn-sm" type="button">+</button>
                                </div>
                            </div>
                            <div class="col-6 col-md-3 mt-3 mt-md-0 text-end">
                                <span class="fw-bold text-orange">2.349.000 đ</span>
                            </div>
                            <button class="btn-remove-item"><i class="fa-regular fa-circle-xmark"></i></button>
                        </div>
                    </div>

                    <div class="p-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="fw-bold text-uppercase">Tổng tiền:</span>
                            <span class="fs-4 fw-bold text-orange">6.839.000 đ</span>
                        </div>
                        <a href="checkout.html"
                            class="btn btn-orange-vnb w-100 py-2 fw-bold text-uppercase fs-5 text-decoration-none d-block text-center">
                            Đặt hàng
                        </a>
                    </div>
                </div>

                <div id="cart-empty" class="text-center py-5 d-none">
                    <div class="mb-4">
                        <img src="../IMG/cart-img.png" alt="Giỏ hàng trống" style="max-width: 200px;"
                            class="opacity-50">
                    </div>
                    <h5 class="mb-3">Không có sản phẩm trong giỏ hàng của bạn</h5>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer" class="site-footer"></footer>
    
</body>

</html>
